<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodSpell</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
html{scroll-behavior:smooth}

/* 🌸 BACKGROUND */
body{
 background:linear-gradient(-45deg,#050507,#1a0d1f,#0d0d14,#1a1a2e);
 background-size:400% 400%;
 animation:bgMove 10s ease infinite;
 color:#fff;
 overflow:hidden;
}

@keyframes bgMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

/* 🌸 NAVBAR */
.nav{
 position:fixed;
 width:100%;
 top:0;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px 25px;
 backdrop-filter:blur(10px);
 background:rgba(0,0,0,0.3);
 z-index:100;
}

.logo{
 font-size:22px;
 font-weight:600;
 color:#ff4fa3;
}

.nav-links a{
 margin:0 10px;
 color:#ccc;
 text-decoration:none;
 transition:0.3s;
}

.nav-links a:hover{color:#ff4fa3}

/* 🌸 MENU */
.menu{
 position:relative;
 font-size:22px;
 cursor:pointer;
}

/* DROPDOWN */
.dropdown{
 position:absolute;
 right:0;
 top:35px;
 background:rgba(0,0,0,0.7);
 backdrop-filter:blur(10px);
 border-radius:12px;
 padding:10px;
 min-width:160px;
 display:flex;
 flex-direction:column;

 opacity:0;
 transform:translateY(-10px);
 pointer-events:none;
 transition:0.3s;
}

.dropdown.active{
 opacity:1;
 transform:translateY(0);
 pointer-events:auto;
}

.dropdown a{
 color:#ccc;
 text-decoration:none;
 padding:10px;
 border-radius:8px;
 transition:0.3s;
}

.dropdown a:hover{
 background:rgba(255,79,163,0.2);
 color:#ff4fa3;
}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
}

.hero img{
 width:140px;
 border-radius:50%;
 border:3px solid #ff4fa3;
 box-shadow:0 0 40px #ff4fa3,0 0 80px #ff4fa3;
 margin-bottom:20px;
 transition:0.4s;
}

.hero img:hover{transform:scale(1.1)}

.hero h1{
 font-size:55px;
 background:linear-gradient(45deg,#ff4fa3,#a855f7);
 -webkit-background-clip:text;
 color:transparent;
}

.hero p{color:#ccc;margin:10px 0}

/* BUTTONS */
.btn{
 padding:12px 25px;
 border-radius:30px;
 border:none;
 cursor:pointer;
 margin:5px;
 transition:0.3s;
}

.primary{
 background:linear-gradient(45deg,#ff4fa3,#a855f7);
 color:white;
}

.secondary{
 background:transparent;
 border:1px solid #555;
 color:#ccc;
}

.primary:hover{
 box-shadow:0 0 20px #ff4fa3;
 transform:scale(1.05);
}

.secondary:hover{
 border-color:#ff4fa3;
 color:#ff4fa3;
 transform:scale(1.05);
}

/* STARS */
.star{
 position:absolute;
 width:2px;
 height:2px;
 background:white;
 opacity:0.6;
}

/* PETALS */
.petal{
 position:absolute;
 width:8px;
 height:8px;
 background:radial-gradient(circle,#ff4fa3,#ff85c1);
 border-radius:50%;
 opacity:0.6;
 animation:fall linear infinite;
}

@keyframes fall{
 0%{transform:translateY(-10vh)}
 100%{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
  <div class="logo">🌸 GodSpell</div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="profiles.html">Members</a>
  </div>

  <div class="menu" onclick="toggleMenu()">⋮
    <div class="dropdown" id="dropdown">
      <a href="#">Guidelines</a>
      <a href="#">Terms</a>
      <a onclick="loginDiscord()">Login</a>
      <a onclick="joinDiscord()">Join Server</a>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <img src="pfp.gif">
  <h1>GodSpell</h1>
  <p>Elite Clan • Builders • PvP • Grind Masters</p>

  <div>
    <button class="btn primary" onclick="goMembers()">🌸 Members</button>
    <button class="btn secondary" onclick="joinDiscord()">💌 Join</button>
  </div>
</section>

<script>
// ⭐ stars
for(let i=0;i<60;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

// 🌸 petals
for(let i=0;i<25;i++){
 let p=document.createElement("div");
 p.className="petal";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(5+Math.random()*5)+"s";
 document.body.appendChild(p);
}

// 🔽 MENU TOGGLE
function toggleMenu(){
 document.getElementById("dropdown").classList.toggle("active");
}

// CLOSE WHEN CLICK OUTSIDE
document.addEventListener("click",(e)=>{
 if(!e.target.closest(".menu")){
   document.getElementById("dropdown").classList.remove("active");
 }
});

// 🔗 BUTTONS
function joinDiscord(){
 window.open("https://discord.gg/YQVF7sy2gR");
}

function goMembers(){
 window.location.href="profiles.html";
}

function loginDiscord(){
 window.location.href =
 "https://discord.com/api/oauth2/authorize?client_id=YOUR_CLIENT_ID&response_type=token&scope=identify";
}
</script>

</body>
</html>
