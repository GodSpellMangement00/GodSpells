<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GodSpell</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
html{scroll-behavior:smooth}

/* 🌸 BACKGROUND */
body{
 background:linear-gradient(-45deg,#050507,#1a0d1f,#0d0d14,#1a1a2e);
 background-size:400% 400%;
 animation:bgMove 12s ease infinite;
 color:#fff;
 overflow-x:hidden;
}

@keyframes bgMove{
 0%{background-position:0% 50%}
 50%{background-position:100% 50%}
 100%{background-position:0% 50%}
}

/* 🌸 SCROLL BAR */
.progress{
 position:fixed;
 top:0;
 left:0;
 height:3px;
 background:#ff4fa3;
 width:0%;
 z-index:200;
}

/* 🌸 NAV */
.nav{
 position:fixed;
 width:100%;
 top:0;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:15px 25px;
 backdrop-filter:blur(10px);
 background:rgba(0,0,0,0.3);
 z-index:100;
}

.logo{color:#ff4fa3;font-size:20px}

.nav-links a{
 margin:0 10px;
 color:#ccc;
 text-decoration:none;
 transition:0.3s;
}

.nav-links a.active{
 color:#ff4fa3;
}

/* MENU */
.menu{cursor:pointer}
.dropdown{
 position:absolute;
 right:10px;
 top:50px;
 background:rgba(0,0,0,0.8);
 padding:10px;
 border-radius:10px;
 display:none;
 flex-direction:column;
}
.dropdown a{
 padding:8px;
 color:#ccc;
}
.dropdown a:hover{color:#ff4fa3}
.dropdown.active{display:flex}

/* HERO */
.hero{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
}

.hero img{
 width:130px;
 border-radius:50%;
 box-shadow:0 0 40px #ff4fa3;
}

.hero h1{
 font-size:55px;
 background:linear-gradient(45deg,#ff4fa3,#a855f7);
 -webkit-background-clip:text;
 color:transparent;
}

/* SECTION */
.section{
 padding:100px 20px;
 max-width:900px;
 margin:auto;

 opacity:0;
 transform:translateY(40px);
 transition:0.8s;

 scroll-margin-top:80px;
}

.section.show{
 opacity:1;
 transform:translateY(0);
}

.section.active{
 box-shadow:0 0 40px rgba(255,79,163,0.3);
 border-radius:20px;
}

/* BUTTON */
.btn{
 padding:10px 20px;
 border-radius:20px;
 background:#ff4fa3;
 border:none;
 color:#fff;
 cursor:pointer;
}

/* STARS */
.star{
 position:absolute;
 width:2px;
 height:2px;
 background:white;
}

/* PETALS */
.petal{
 position:absolute;
 width:8px;
 height:8px;
 background:#ff4fa3;
 border-radius:50%;
 animation:fall linear infinite;
}
@keyframes fall{
 0%{transform:translateY(-10vh)}
 100%{transform:translateY(110vh)}
}
</style>
</head>

<body>

<div class="progress" id="progress"></div>

<div class="nav">
 <div class="logo">🌸 GodSpell</div>

 <div class="nav-links">
  <a href="#about">About</a>
  <a href="#guidelines">Guidelines</a>
  <a href="#members">Members</a>
  <a href="#terms">Terms</a>
 </div>

 <div class="menu" onclick="toggleMenu()">⋮
  <div class="dropdown" id="dropdown">
    <a href="#about">About</a>
    <a href="#guidelines">Guidelines</a>
    <a href="#members">Members</a>
    <a href="#terms">Terms</a>
    <a onclick="joinDiscord()">Join</a>
  </div>
 </div>
</div>

<!-- HERO -->
<section class="hero">
<img src="pfp.gif">
<h1>GodSpell</h1>
</section>

<section id="about" class="section">
<h2>About Us</h2>
<p>GodSpell is a high-level Minecraft clan focused on teamwork and dominance.</p>
</section>

<section id="guidelines" class="section">
<h2>Guidelines</h2>
<p>Respect • Stay active • Follow rules</p>
</section>

<section id="members" class="section">
<h2>Members</h2>
<button class="btn" onclick="goMembers()">View Members</button>
</section>

<section id="terms" class="section">
<h2>Terms</h2>
<p>Breaking rules may result in removal.</p>
</section>

<script>
// ⭐ stars
for(let i=0;i<60;i++){
 let s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

// 🌸 petals
for(let i=0;i<25;i++){
 let p=document.createElement("div");
 p.className="petal";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(5+Math.random()*5)+"s";
 document.body.appendChild(p);
}

// MENU
function toggleMenu(){
 document.getElementById("dropdown").classList.toggle("active");
}

// SCROLL PROGRESS
window.onscroll=()=>{
 let winScroll=document.documentElement.scrollTop;
 let height=document.documentElement.scrollHeight - document.documentElement.clientHeight;
 document.getElementById("progress").style.width=(winScroll/height)*100+"%";
}

// SCROLL REVEAL + ACTIVE
const sections=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
 sections.forEach(sec=>{
  const top=sec.getBoundingClientRect().top;

  if(top<window.innerHeight-100){
    sec.classList.add("show");
  }

  // active highlight
  if(top<200 && top>-200){
    sec.classList.add("active");
  }else{
    sec.classList.remove("active");
  }
 });
});

// SMOOTH NAV CLICK
document.querySelectorAll('a[href^="#"]').forEach(link=>{
 link.onclick=function(e){
  e.preventDefault();
  document.querySelector(this.getAttribute("href"))
  .scrollIntoView({behavior:"smooth"});
 }
});

// BUTTONS
function goMembers(){
 window.location.href="profiles.html";
}

function joinDiscord(){
 window.open("https://discord.gg/YQVF7sy2gR");
}
</script>

</body>
</html>
